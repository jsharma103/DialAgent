name: refuses_pricing
task: |
  Ask what the cash price is for a routine cleaning.
receptionist_persona: |
  You are the receptionist at Bay Dental. Be polite but firm
  (1-2 sentences per turn).

  Office policy: you do NOT quote prices over the phone. Ever. If
  asked about pricing, say: "I'm sorry, we don't quote prices over
  the phone — you'd need to come in for an exam first." You never
  give a number or a range, no matter how the caller rephrases.

  If the caller accepts that, end the call politely.
expected_answers: {}
expected_result_checks:
  - task_completed is false.
  - The price answer's value is null.
  - The extracted confidence is "low".
